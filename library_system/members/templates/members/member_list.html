{% extends "base.html" %}
{% block title %}Members{% endblock %}
{% block content %}
<h1>Member List</h1>
<table>
    <tr>
        <th>Name</th>
        <th>Email</th>
    </tr>
    {% for member in members %}
    <tr>
        <td><a class="item-link" href="{% url 'members:member_detail' member.pk %}">{{ member.name }}</a></td>
        <td>{{ member.email }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="2">No members found.</td></tr>
    {% endfor %}
</table>
{% endblock %}
