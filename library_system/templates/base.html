<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Library System{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #2c3e50;
            padding: 15px 30px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #ecf0f1;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        a.item-link {
            color: #2980b9;
            text-decoration: none;
        }
        a.item-link:hover {
            text-decoration: underline;
        }
        .status-available {
            color: green;
            font-weight: bold;
        }
        .status-borrowed {
            color: #c0392b;
            font-weight: bold;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/books/">Books</a>
        <a href="/authors/">Authors</a>
        <a href="/members/">Members</a>
        <a href="/borrowing/">Borrowing</a>
        <a href="/admin/">Admin</a>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
