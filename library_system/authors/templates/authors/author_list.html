{% extends "base.html" %}
{% block title %}Authors{% endblock %}
{% block content %}
<h1>Author List</h1>
<table>
    <tr>
        <th>Name</th>
        <th>Nationality</th>
    </tr>
    {% for author in authors %}
    <tr>
        <td><a class="item-link" href="{% url 'authors:author_detail' author.pk %}">{{ author.name }}</a></td>
        <td>{{ author.nationality }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="2">No authors found.</td></tr>
    {% endfor %}
</table>
{% endblock %}
